name: samby
description: "Samby — Association management PWA."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_data_connect: ^0.2.4
  firebase_analytics: ^12.2.0
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.3.5

  # State management & DI
  provider: ^6.1.2
  get_it: ^7.7.0

  # UI
  cached_network_image: ^3.4.1
  auto_size_text: ^3.0.0
  google_fonts: ^6.2.1
  animations: ^2.1.2
  cupertino_icons: ^1.0.8
  signature: ^5.3.0
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.20.2
  web: ^1.1.1
  logger: ^2.6.2
  shared_preferences: ^2.3.2
  collection: ^1.19.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
