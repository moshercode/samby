# Seed data for local development and testing.
# Run with: firebase dataconnect:execute --file firebase/dataconnect/seed_data.gql
#
# Replace the placeholder UUIDs with real values:
#   ASSOCIATION_ID  → your association's UUID (from GetAssociationBySubdomain)
#   USER_MANAGER_ID → your manager AppUser.id (from GetUserByEmail)
#   USER_MEMBER1_ID → a test member AppUser.id (insert via SeedAppUser1 first)
#   USER_MEMBER2_ID → another test member AppUser.id (insert via SeedAppUser2 first)
#
# Recommended execution order:
#   1. SeedCondition1..5
#   2. SeedEvent1..3
#   3. SeedAppUser1, SeedAppUser2  →  note returned IDs
#   4. SeedMembership1, SeedMembership2  (fill in member IDs above first)

# ── Association conditions ─────────────────────────────────────────────────────

mutation SeedCondition1 {
  associationCondition_insert(data: {
    associationId: "ASSOCIATION_ID"
    type: "general"
    content: "El socio se compromete a cumplir los estatutos y reglamentos internos de la asociación."
    sortOrder: 1
  })
}

mutation SeedCondition2 {
  associationCondition_insert(data: {
    associationId: "ASSOCIATION_ID"
    type: "general"
    content: "El socio autoriza el tratamiento de sus datos personales conforme al RGPD para la gestión de su membresía."
    sortOrder: 2
  })
}

mutation SeedCondition3 {
  associationCondition_insert(data: {
    associationId: "ASSOCIATION_ID"
    type: "general"
    content: "El socio se compromete al pago de las cuotas establecidas por la junta directiva en cada ejercicio."
    sortOrder: 3
  })
}

mutation SeedCondition4 {
  associationCondition_insert(data: {
    associationId: "ASSOCIATION_ID"
    type: "minor"
    content: "El tutor legal autoriza la participación del menor en las actividades de la asociación y asume la responsabilidad derivada."
    sortOrder: 1
  })
}

mutation SeedCondition5 {
  associationCondition_insert(data: {
    associationId: "ASSOCIATION_ID"
    type: "minor"
    content: "El tutor legal autoriza el tratamiento de los datos del menor conforme al RGPD."
    sortOrder: 2
  })
}

