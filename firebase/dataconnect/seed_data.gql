    description: "Reunión ordinaria de socios para revisar el estado de la asociación y aprobar el presupuesto del próximo trimestre. La asistencia es obligatoria para los miembros de la junta."
    eventDate: "2026-05-15T18:00:00Z"
    endDate: "2026-05-15T20:00:00Z"
    createdById: "USER_MANAGER_ID"
  })
}

