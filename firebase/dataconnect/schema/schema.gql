type Band @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  shortName: String!
  subdomain: String!
  logoUrl: String!
  iconUrl: String!
  primaryColor: String!
  secondaryColor: String!
  founderEmail: String!
  requireIdDoc: Boolean! @default(expr: "false")
  requireIdDocImage: Boolean! @default(expr: "false")
  requireGuardian: Boolean! @default(expr: "false")
  active: Boolean! @default(expr: "false")
  createdAt: Timestamp! @default(expr: "request.time")
}

type BandCondition @table {
  id: UUID! @default(expr: "uuidV4()")
  band: Band!
  type: String!
  content: String!
  sortOrder: Int!
  createdAt: Timestamp! @default(expr: "request.time")
}

enum MemberRole {
  MANAGER
  MEMBER
}

type Member @table {
  id: UUID! @default(expr: "uuidV4()")
  band: Band!
  email: String!
  phone: String!
  role: MemberRole!
  status: String!
  isBlocked: Boolean!
  isFounder: Boolean!
  createdAt: Timestamp! @default(expr: "request.time")
  name: String
  birthDate: Date
  idDoc: String
  idDocImageUrl: String
  profileImageUrl: String
  guardianName: String
  guardianIdDoc: String
  guardianIdDocImageUrl: String
  signatureUrl: String
  conditionsAcceptedAt: Timestamp
  minorConditionsAcceptedAt: Timestamp
  internalNotes: String
  requestedAt: Timestamp
  resolvedAt: Timestamp
  resolvedBy: Member
  passwordHash: String
  passwordResetToken: String
  passwordResetTokenExpiresAt: Timestamp
  passwordResetTokenUses: Int
  fcmToken: String
  fcmTokenUpdatedAt: Timestamp
}

enum EventStatus {
  ACTIVE
  FINISHED
  CANCELLED
}

type Event @table {
  id: UUID! @default(expr: "uuidV4()")
  band: Band!
  title: String!
  description: String!
  imageUrl: String!
  startDate: Timestamp
  endDate: Timestamp
  status: EventStatus!
  freeEntry: Boolean! @default(expr: "true")
  entryCondition: String
  updatedAt: Timestamp
  createdBy: Member!
  createdAt: Timestamp! @default(expr: "request.time")
}

type EventMember @table {
  id: UUID! @default(expr: "uuidV4()")
  event: Event!
  member: Member!
  status: String!
  requestedAt: Timestamp
  resolvedAt: Timestamp
  resolvedBy: Member
}

type EventAppointment @table {
  id: UUID! @default(expr: "uuidV4()")
  event: Event!
  title: String!
  description: String!
  eventDate: Timestamp!
  endDate: Timestamp
  createdBy: Member!
  createdAt: Timestamp! @default(expr: "request.time")
}

type EventAppointmentComment @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  eventAppointment: EventAppointment!
  author: Member!
  content: String!
  imageUrls: String
  parentComment: EventAppointmentComment
  createdAt: Timestamp! @default(expr: "request.time")
}

type BroadcastMessage @table {
  id: UUID! @default(expr: "uuidV4()")
  band: Band!
  sentBy: Member!
  title: String!
  body: String!
  sentAt: Timestamp! @default(expr: "request.time")
}
