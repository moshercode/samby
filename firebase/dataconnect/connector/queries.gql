query GetAssociationByFounderEmail($founderEmail: String!) @auth(level: USER) {
  association(first: { where: { founderEmail: { eq: $founderEmail } } }) {
    id
    name
    shortName
    subdomain
    logoUrl
    iconUrl
    primaryColor
    secondaryColor
    founderEmail
    requireDni
    requireDniImage
    requireGuardian
    active
    createdAt
  }
}

query GetAssociationBySubdomain($subdomain: String!) @auth(level: PUBLIC) {
  association(first: { where: { subdomain: { eq: $subdomain } } }) {
    id
    name
    shortName
    subdomain
    logoUrl
    iconUrl
    primaryColor
    secondaryColor
    founderEmail
    requireDni
    requireDniImage
    requireGuardian
    active
    createdAt
  }
}

query GetMember($memberId: UUID!) @auth(level: USER) {
  member(key: { id: $memberId }) {
    id
    association { id }
    email
    name
    phone
    role
    status
    isBlocked
    isFounder
    createdAt
    memberName
    memberBirthDate
    memberDni
    memberDniImageUrl
    profileImageUrl
    guardianName
    guardianDni
    guardianDniImageUrl
    signatureUrl
    conditionsAcceptedAt
    minorConditionsAcceptedAt
    internalNotes
    requestedAt
    resolvedAt
  }
}

query GetAssociationConditions($associationId: UUID!) @auth(level: PUBLIC) {
  associationConditions(where: { associationId: { eq: $associationId } }, orderBy: [{ sortOrder: ASC }]) {
    id
    type
    content
    sortOrder
  }
}

query GetAssociationMembers($associationId: UUID!) @auth(level: USER) {
  members(where: { associationId: { eq: $associationId } }, orderBy: [{ createdAt: DESC }]) {
    id
    email
    name
    phone
    role
    status
    isBlocked
    isFounder
    createdAt
    memberName
    memberBirthDate
    memberDni
    memberDniImageUrl
    profileImageUrl
    guardianName
    guardianDni
    guardianDniImageUrl
    signatureUrl
    conditionsAcceptedAt
    minorConditionsAcceptedAt
    internalNotes
    requestedAt
    resolvedAt
  }
}

query GetAssociationEvents($associationId: UUID!) @auth(level: USER) {
  events(where: { associationId: { eq: $associationId } }, orderBy: [{ createdAt: DESC }]) {
    id
    title
    description
    imageUrl
    startDate
    endDate
    status
    freeEntry
    entryCondition
    updatedAt
    createdAt
    eventMembers_on_event {
      member { id }
    }
  }
}

query GetEventDetail($eventId: UUID!) @auth(level: USER) {
  event(key: { id: $eventId }) {
    id
    title
    description
    imageUrl
    startDate
    endDate
    status
    freeEntry
    entryCondition
    updatedAt
    createdAt
    eventAppointments_on_event(orderBy: [{ eventDate: ASC }]) {
      id
      title
      description
      eventDate
      endDate
      createdAt
    }
    eventMembers_on_event {
      id
      member { id name memberName }
    }
  }
}

query GetMemberEvents($memberId: UUID!) @auth(level: USER) {
  eventMembers(where: { memberId: { eq: $memberId } }) {
    event {
      id
      title
      description
      imageUrl
      startDate
      endDate
      status
      freeEntry
      entryCondition
      updatedAt
      createdAt
    }
  }
}

query GetEventAccessRequest($eventId: UUID!, $memberId: UUID!) @auth(level: USER) {
  eventAccessRequests(
    where: { eventId: { eq: $eventId }, memberId: { eq: $memberId } }
    first: 1
  ) {
    id
    status
    requestedAt
    resolvedAt
  }
}

query GetEventAppointmentDetail($appointmentId: UUID!) @auth(level: USER) {
  eventAppointment(key: { id: $appointmentId }) {
    id
    event { id title }
    title
    description
    eventDate
    endDate
    createdAt
    eventAppointmentComments_on_eventAppointment(orderBy: [{ createdAt: ASC }]) {
      id
      author { id name memberName profileImageUrl }
      content
      imageUrls
      createdAt
    }
  }
}
