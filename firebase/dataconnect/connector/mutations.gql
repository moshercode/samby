mutation CreateAssociation(
  $name: String!
  $shortName: String!
  $subdomain: String!
  $primaryColor: String!
  $secondaryColor: String!
  $founderEmail: String!
) @auth(level: USER) {
  association_insert(data: {
    name: $name
    shortName: $shortName
    subdomain: $subdomain
    logoUrl: ""
    iconUrl: ""
    primaryColor: $primaryColor
    secondaryColor: $secondaryColor
    founderEmail: $founderEmail
  })
}

mutation UpdateAssociationImages(
  $id: UUID!
  $logoUrl: String!
  $iconUrl: String!
) @auth(level: USER) {
  association_update(key: { id: $id }, data: {
    logoUrl: $logoUrl
    iconUrl: $iconUrl
  })
}

mutation UpdateAssociation(
  $id: UUID!
  $requireDni: Boolean!
  $requireDniImage: Boolean!
  $requireGuardian: Boolean!
) @auth(level: USER) {
  association_update(key: { id: $id }, data: {
    requireDni: $requireDni
    requireDniImage: $requireDniImage
    requireGuardian: $requireGuardian
  })
}

mutation AddAssociationCondition(
  $associationId: UUID!
  $type: String!
  $content: String!
  $sortOrder: Int!
) @auth(level: USER) {
  associationCondition_insert(data: {
    associationId: $associationId
    type: $type
    content: $content
    sortOrder: $sortOrder
  })
}

mutation DeleteAssociationCondition($id: UUID!) @auth(level: USER) {
  associationCondition_delete(key: { id: $id })
}

mutation CreateFounderMember(
  $associationId: UUID!
  $name: String!
  $email: String!
  $conditionsAcceptedAt: Timestamp!
) @auth(level: USER) {
  member_insert(data: {
    associationId: $associationId
    email: $email
    name: $name
    phone: ""
    role: MANAGER
    status: "approved"
    isBlocked: false
    isFounder: true
    conditionsAcceptedAt: $conditionsAcceptedAt
  })
}

mutation UpdateMemberApplication(
  $id: UUID!
  $memberName: String!
  $memberBirthDate: Date!
  $memberDni: String!
  $memberDniImageUrl: String!
  $guardianName: String
  $guardianDni: String
  $guardianDniImageUrl: String
  $signatureUrl: String!
  $conditionsAcceptedAt: Timestamp!
  $minorConditionsAcceptedAt: Timestamp
  $requestedAt: Timestamp!
) @auth(level: USER) {
  member_update(key: { id: $id }, data: {
    status: "pending"
    memberName: $memberName
    memberBirthDate: $memberBirthDate
    memberDni: $memberDni
    memberDniImageUrl: $memberDniImageUrl
    guardianName: $guardianName
    guardianDni: $guardianDni
    guardianDniImageUrl: $guardianDniImageUrl
    signatureUrl: $signatureUrl
    conditionsAcceptedAt: $conditionsAcceptedAt
    minorConditionsAcceptedAt: $minorConditionsAcceptedAt
    requestedAt: $requestedAt
  })
}

mutation ResetMemberApplication(
  $id: UUID!
  $memberName: String!
  $memberBirthDate: Date!
  $memberDni: String!
  $memberDniImageUrl: String!
  $guardianName: String
  $guardianDni: String
  $guardianDniImageUrl: String
  $signatureUrl: String!
  $conditionsAcceptedAt: Timestamp!
  $minorConditionsAcceptedAt: Timestamp
  $requestedAt: Timestamp!
) @auth(level: USER) {
  member_update(key: { id: $id }, data: {
    status: "pending"
    memberName: $memberName
    memberBirthDate: $memberBirthDate
    memberDni: $memberDni
    memberDniImageUrl: $memberDniImageUrl
    guardianName: $guardianName
    guardianDni: $guardianDni
    guardianDniImageUrl: $guardianDniImageUrl
    signatureUrl: $signatureUrl
    conditionsAcceptedAt: $conditionsAcceptedAt
    minorConditionsAcceptedAt: $minorConditionsAcceptedAt
    requestedAt: $requestedAt
    resolvedAt: null
    resolvedById: null
  })
}

mutation UpdateMemberStatus(
  $id: UUID!
  $status: String!
  $resolvedBy: UUID!
  $resolvedAt: Timestamp!
) @auth(level: USER) {
  member_update(key: { id: $id }, data: {
    status: $status
    resolvedById: $resolvedBy
    resolvedAt: $resolvedAt
  })
}

mutation UpdateMemberRole($id: UUID!, $role: MemberRole!) @auth(level: USER) {
  member_update(key: { id: $id }, data: { role: $role })
}

mutation UpdateMemberBlock($id: UUID!, $isBlocked: Boolean!) @auth(level: USER) {
  member_update(key: { id: $id }, data: { isBlocked: $isBlocked })
}

mutation UpdateMemberNotes($id: UUID!, $internalNotes: String!) @auth(level: USER) {
  member_update(key: { id: $id }, data: { internalNotes: $internalNotes })
}

mutation UpdateMemberFcmToken($id: UUID!, $token: String!, $updatedAt: Timestamp!) @auth(level: USER) {
  member_update(key: { id: $id }, data: { fcmToken: $token fcmTokenUpdatedAt: $updatedAt })
}

mutation CreateEvent(
  $associationId: UUID!
  $title: String!
  $description: String!
  $imageUrl: String!
  $startDate: Timestamp
  $endDate: Timestamp
  $freeEntry: Boolean!
  $entryCondition: String
  $createdBy: UUID!
) @auth(level: USER) {
  event_insert(data: {
    associationId: $associationId
    title: $title
    description: $description
    imageUrl: $imageUrl
    startDate: $startDate
    endDate: $endDate
    status: ACTIVE
    freeEntry: $freeEntry
    entryCondition: $entryCondition
    createdById: $createdBy
  })
}

mutation UpdateEventStatus(
  $id: UUID!
  $status: EventStatus!
  $updatedAt: Timestamp!
) @auth(level: USER) {
  event_update(key: { id: $id }, data: {
    status: $status
    updatedAt: $updatedAt
  })
}

mutation AddEventMember($eventId: UUID!, $memberId: UUID!) @auth(level: USER) {
  eventMember_insert(data: {
    eventId: $eventId
    memberId: $memberId
  })
}

mutation RemoveEventMember($eventId: UUID!, $memberId: UUID!) @auth(level: USER) {
  eventMember_deleteMany(where: { eventId: { eq: $eventId }, memberId: { eq: $memberId } })
}

mutation RequestEventAccess(
  $eventId: UUID!
  $memberId: UUID!
) @auth(level: USER) {
  eventAccessRequest_insert(data: {
    eventId: $eventId
    memberId: $memberId
    status: "pending"
  })
}

mutation ResolveEventAccess(
  $id: UUID!
  $status: String!
  $resolvedBy: UUID!
  $resolvedAt: Timestamp!
) @auth(level: USER) {
  eventAccessRequest_update(key: { id: $id }, data: {
    status: $status
    resolvedById: $resolvedBy
    resolvedAt: $resolvedAt
  })
}

mutation CreateEventAppointment(
  $eventId: UUID!
  $title: String!
  $description: String!
  $eventDate: Timestamp!
  $endDate: Timestamp
  $createdBy: UUID!
) @auth(level: USER) {
  eventAppointment_insert(data: {
    eventId: $eventId
    title: $title
    description: $description
    eventDate: $eventDate
    endDate: $endDate
    createdById: $createdBy
  })
}

mutation SendBroadcast(
  $associationId: UUID!
  $sentBy: UUID!
  $title: String!
  $body: String!
) @auth(level: USER) {
  broadcastMessage_insert(data: {
    associationId: $associationId
    sentById: $sentBy
    title: $title
    body: $body
  })
}
